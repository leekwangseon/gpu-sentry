name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semantic version tag to release (for example v0.6.0)
        required: true
  push:
    tags: ['v*.*.*']
env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Validate tag and version
        run: test "${RELEASE_TAG#v}" = "$(./bin/gpu-sentry --version | awk '{print $2}')"
      - name: Build archive
        run: git archive --format=tar.gz --prefix="gpu-sentry-${RELEASE_TAG#v}/" -o "gpu-sentry-${RELEASE_TAG#v}.tar.gz" HEAD
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: gpu-sentry-*.tar.gz
